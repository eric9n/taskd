name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Package release archive
        env:
          PACKAGE_NAME: taskd-x86_64-unknown-linux-gnu
        run: |
          rm -rf dist
          mkdir -p "dist/${PACKAGE_NAME}/bin" "dist/${PACKAGE_NAME}/config" "dist/${PACKAGE_NAME}/deploy"
          install -m 0755 target/release/taskd "dist/${PACKAGE_NAME}/bin/taskd"
          install -m 0755 target/release/taskctl "dist/${PACKAGE_NAME}/bin/taskctl"
          install -m 0644 config/tasks.yaml "dist/${PACKAGE_NAME}/config/tasks.yaml"
          install -m 0644 deploy/taskd.service "dist/${PACKAGE_NAME}/deploy/taskd.service"
          tar -C dist -czf "${PACKAGE_NAME}.tar.gz" "${PACKAGE_NAME}"
          sha256sum "${PACKAGE_NAME}.tar.gz" > "${PACKAGE_NAME}.tar.gz.sha256"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            taskd-x86_64-unknown-linux-gnu.tar.gz
            taskd-x86_64-unknown-linux-gnu.tar.gz.sha256
