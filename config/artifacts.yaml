version: 1

artifacts:
  - id: daily_ops
    timezone: Asia/Shanghai
    workdir: /var/lib/taskd/artifacts/daily_ops
    collectors:
      - id: taskd
        command:
          program: /opt/taskd/taskctl
          args:
            - --json
            - report
            - daily
            - --date
            - "{{artifact_date}}"
            - --timezone
            - Asia/Shanghai
            - --output
            - "{{collector_output}}"
    renderer:
      program: /usr/local/bin/render-artifact-agent
      args:
        - --input
        - "{{render_input_file}}"
        - --output
        - "{{render_file}}"
    sinks:
      - id: discord
        command:
          program: /usr/local/bin/post-discord-webhook
          args:
            - --input
            - "{{render_file}}"
