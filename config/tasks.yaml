version: 1
# To load shared environment variables, uncomment:
# env_files:
#   - /etc/taskd/taskd.env

notifications:
  enabled: false

tasks:
  - id: health-check
    name: health check
    enabled: true
    concurrency:
      policy: forbid
      max_running: 1
    retry:
      max_attempts: 2
      delay_seconds: 5
    schedule:
      kind: interval
      seconds: 300
    command:
      program: /bin/echo
      args:
        - ok
      timeout_seconds: 5
